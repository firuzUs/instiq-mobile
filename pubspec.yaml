publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.0.0
  go_router: ^14.0.0
  flutter_riverpod: ^2.0.0
  cached_network_image: ^3.3.0
  google_fonts: ^6.0.0
  flutter_svg: ^2.0.0
  shimmer: ^3.0.0
  intl: ^0.19.0
  flutter_markdown: ^0.7.0
  fl_chart: ^0.68.0
  share_plus: ^9.0.0
  url_launcher: ^6.0.0
  shared_preferences: ^2.2.0
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.0
  purchases_flutter: ^7.0.0
  image_picker: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
